name: Build Release Module

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Extract version from module.prop
        id: version
        run: |
          VERSION=$(grep '^version=' src/module.prop | cut -d= -f2)
          VERSION_CODE=$(grep '^versionCode=' src/module.prop | cut -d= -f2)
          if [ -z "$VERSION" ] || [ -z "$VERSION_CODE" ]; then
            echo "Version not found in src/module.prop"
            exit 1
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag ($TAG) does not match module.prop version ($VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "raw_version=$(echo $VERSION | sed 's/v//')" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build

      - name: Package module zip
        run: |
          cd Module
          zip -r "../Specter-${{ steps.version.outputs.version }}.zip" .

      - name: Push module to Telegram channel
        env:
          MODULE_PATH: Specter-${{ steps.version.outputs.version }}.zip
          MODULE_VERSION: ${{ steps.version.outputs.version }}
          MODULE_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Missing Telegram secrets. Configure TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in repo secrets." >&2
            exit 0
          fi

          COMMIT_SUBJECT=$(git log -1 --pretty=%s)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_BODY=$(git log -1 --pretty=%b)
          GIT_HASH=$(git rev-parse --short=8 HEAD)

          caption=$(python3 - <<'PY'
          import os

          def escape(s):
              return s.replace("&","&amp;").replace("<","&lt;").replace(">","&gt;")

          module_path = os.environ["MODULE_PATH"]
          module_ver  = os.environ["MODULE_VERSION"]
          module_vc   = os.environ["MODULE_VERSION_CODE"]
          subject     = os.environ.get("COMMIT_SUBJECT","")
          author      = os.environ.get("COMMIT_AUTHOR","")
          body        = os.environ.get("COMMIT_BODY","")
          git_hash    = os.environ.get("GIT_HASH","")
          branch      = os.environ.get("GITHUB_REF_NAME","")
          repo        = os.environ.get("GITHUB_REPOSITORY","")

          summary = ""
          paragraphs = []
          cur = []
          for line in body.splitlines():
              line = line.strip()
              if not line:
                  if cur:
                      paragraphs.append(" ".join(cur))
                      cur = []
                  continue
              cur.append(line)
          if cur:
              paragraphs.append(" ".join(cur))
          if paragraphs:
              summary = paragraphs[0]

          lines = [
              f"Version: <b>{escape(module_ver)} ({escape(module_vc)})</b>",
              f"Module: <b>{escape(module_path)}</b>",
              "Commit:",
              f"<pre>{escape(subject)}</pre>",
          ]
          if summary:
              lines.insert(4, f"<pre>{escape(summary)}</pre>")
          lines += [
              f"Author: <b>{escape(author)}</b>",
              f"Branch: <b>{escape(branch)}@{escape(git_hash)}</b>",
              f"Repo: <b>{escape(repo)}</b>",
          ]

          caption = "\n".join(lines)
          cap_len = len(caption)
          if cap_len > 1024:
              excess = cap_len - 1024
              if summary:
                  trim = max(0, len(summary) - excess - 3)
                  cap = caption.replace(summary, summary[:trim].rstrip() + "..." if trim > 3 else "")
                  if len(cap) <= 1024:
                      caption = cap
              if len(caption) > 1024:
                  caption = caption[:1021].rstrip() + "..."
          print(caption)
          PY
          )

          response_file=$(mktemp)
          http_code=$(curl --silent --show-error --output "${response_file}" --write-out "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${MODULE_PATH}" \
            -F "parse_mode=HTML" \
            --form-string "caption=${caption}")

          if [ "${http_code}" != "200" ]; then
            echo "Telegram API returned HTTP ${http_code}." >&2
            cat "${response_file}" >&2
            exit 1
          fi

          message_id=$(python3 -c "
          import json,sys
          r=json.load(open('${response_file}'))
          if not r.get('ok'): sys.exit(r.get('description','API error'))
          print(r['result']['message_id'])
          ")
          echo "Telegram message_id: ${message_id}"

      - name: Extract current release notes
        run: |
          python3 - <<'PY'
          import re, sys
          ver = "${{ steps.version.outputs.version }}"
          with open("changelog.md") as f:
              content = f.read()
          pattern = re.compile(rf'^(# {re.escape(ver)}\s*.*?)(?=^# v|\Z)', re.MULTILINE | re.DOTALL)
          match = pattern.search(content)
          if match:
              with open("release-notes.md", "w") as out:
                  out.write(match.group(1).strip() + "\n")
          else:
              print(f"Section not found for version {ver}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "Specter ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            "Specter-${{ steps.version.outputs.version }}.zip"

      - name: Update update.json
        run: |
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/Specter-${{ steps.version.outputs.version }}.zip"
          jq --arg v "${{ steps.version.outputs.raw_version }}" \
             --argjson vc "${{ steps.version.outputs.version_code }}" \
             --arg url "$ZIP_URL" \
             '.version = $v | .versionCode = $vc | .zipUrl = $url' \
             update.json > update_tmp.json && mv update_tmp.json update.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump update.json to ${{ steps.version.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi
